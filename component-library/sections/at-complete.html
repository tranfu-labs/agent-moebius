<section class="spec" data-component="at-complete" id="at-complete">
  <header class="spec-h">
    <h2>@ 补全面板</h2><code>?only=at-complete</code>
    <p>输入框里键入 @ 时浮出的补全面板：只列本条消息合法可触发的角色，中文名 + 一句职责。选中后由控件在协议层生成合法 mention，你不接触英文句柄。一条消息至多一个合法 mention。</p>
  </header>
  <div class="spec-stage">

    <div class="stage-col gap-10">

      <!-- ① 刚输入 @：面板浮出，列全部合法角色，首行选中 -->
      <div class="specimen">
        <div class="cap">① 刚输入 @ · 列全部合法角色，首行选中</div>
        <div class="relative w-full max-w-[560px] pb-[132px]">
          <!-- 输入框（复用 composer 同款） -->
          <div class="flex items-end gap-2 bg-input border border-line rounded-lg px-3 py-2.5">
            <div class="flex-1 min-w-0 text-sm text-ink leading-relaxed">
              @<span class="inline-block w-[2px] h-[15px] align-[-2px] bg-ink animate-breathe"></span>
            </div>
            <button class="shrink-0 inline-flex items-center gap-1.5 bg-card border border-line text-hint rounded-md text-[13px] font-medium px-3 py-1">
              发送
              <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M5 12h13M13 6l6 6-6 6"/></svg>
            </button>
          </div>
          <!-- 补全面板 -->
          <div class="absolute left-3 top-[52px] w-[300px] bg-card border border-line rounded-lg shadow-overlay p-1.5">
            <div class="flex items-center px-2.5 py-2 rounded-md bg-sel">
              <span class="text-sm text-ink">@开发</span>
              <span class="ml-auto text-xs text-hint">写代码</span>
            </div>
            <div class="flex items-center px-2.5 py-2 rounded-md hover:bg-hover">
              <span class="text-sm text-ink">@测试</span>
              <span class="ml-auto text-xs text-hint">审查方案</span>
            </div>
            <div class="flex items-center px-2.5 py-2 rounded-md hover:bg-hover">
              <span class="text-sm text-ink">@技术负责人</span>
              <span class="ml-auto text-xs text-hint">技术决策</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ② 键入 @技：过滤只剩技术负责人 -->
      <div class="specimen">
        <div class="cap">② 键入「@技」· 过滤只剩技术负责人</div>
        <div class="relative w-full max-w-[560px] pb-[64px]">
          <div class="flex items-end gap-2 bg-input border border-line rounded-lg px-3 py-2.5">
            <div class="flex-1 min-w-0 text-sm text-ink leading-relaxed">
              @技<span class="inline-block w-[2px] h-[15px] align-[-2px] bg-ink animate-breathe"></span>
            </div>
            <button class="shrink-0 inline-flex items-center gap-1.5 bg-card border border-line text-hint rounded-md text-[13px] font-medium px-3 py-1">
              发送
              <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M5 12h13M13 6l6 6-6 6"/></svg>
            </button>
          </div>
          <div class="absolute left-3 top-[52px] w-[300px] bg-card border border-line rounded-lg shadow-overlay p-1.5">
            <div class="flex items-center px-2.5 py-2 rounded-md bg-sel">
              <span class="text-sm text-ink">@技术负责人</span>
              <span class="ml-auto text-xs text-hint">技术决策</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ③ 已选：mention 高亮插入输入框，面板收起，发送就绪 -->
      <div class="specimen">
        <div class="cap">③ 已选 · mention 插入输入框，面板收起</div>
        <div class="w-full max-w-[560px]">
          <div class="flex items-end gap-2 bg-input border border-line rounded-lg px-3 py-2.5">
            <div class="flex-1 min-w-0 text-sm text-ink leading-relaxed">
              <span class="text-accent font-semibold">@技术负责人</span>
              <span> 这版分层要不要拆一个独立服务，帮我拿个主意</span><span class="inline-block w-[2px] h-[15px] align-[-2px] bg-ink animate-breathe"></span>
            </div>
            <button class="shrink-0 inline-flex items-center gap-1.5 bg-accent text-accent-fg rounded-md text-[13px] font-medium px-3 py-1">
              发送
              <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M5 12h13M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>

  </div>
</section>
