<section class="spec" data-component="role-avatars" id="role-avatars">
  <header class="spec-h">
    <h2>角色头像</h2><code>?only=role-avatars</code>
    <p>参与对话的七个角色，用统一中性灰圆头像 + 单字区分；下方补一行行内「角色 chip」标签写法。全灰、不用色相。</p>
  </header>
  <div class="spec-stage">

    <!-- 一排头像 + 全名 cap -->
    <div class="specimen">
      <div class="cap">头像排（七个角色）</div>
      <div class="stage-row items-start gap-4">

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">你</span>
          <span class="text-[11px] text-sub">你</span>
        </div>

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">开</span>
          <span class="text-[11px] text-sub">开发</span>
        </div>

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">测</span>
          <span class="text-[11px] text-sub">测试</span>
        </div>

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">技</span>
          <span class="text-[11px] text-sub">技术负责人</span>
        </div>

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">品</span>
          <span class="text-[11px] text-sub">产品</span>
        </div>

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">代</span>
          <span class="text-[11px] text-sub">用户代表</span>
        </div>

        <div class="flex flex-col items-center gap-1.5">
          <span class="w-[26px] h-[26px] rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">C</span>
          <span class="text-[11px] text-sub">CEO</span>
        </div>

      </div>
    </div>

    <!-- 角色 chip 行内标签 -->
    <div class="specimen">
      <div class="cap">角色 chip（行内标签）</div>
      <div class="stage-row gap-2">

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">你</span>
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">开发</span>
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">测试</span>
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">技术负责人</span>
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">产品</span>
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">用户代表</span>
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-hint"></span>
          <span class="text-xs text-sub">CEO</span>
        </span>

      </div>
    </div>

  </div>
</section>
