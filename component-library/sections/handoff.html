<section class="spec" data-component="handoff" id="handoff">
  <header class="spec-h">
    <h2>交棒节点（消息间）</h2><code>?only=handoff</code>
    <p>一个角色把控制权交给下一个角色时，在两条消息之间插入的显式分隔节点：细线居中小字「A → B · 事由」。全灰，只有当接棒方是「你」时才用强调色。</p>
  </header>
  <div class="spec-stage max-w-[640px]">

    <!-- 几个基础样本 -->
    <div class="specimen">
      <div class="cap">开发 → 测试 · 交付审查</div>
      <div class="flex items-center gap-2 my-3.5 text-hint text-xs">
        <span class="flex-1 h-px bg-line"></span>
        <span class="inline-flex items-center gap-1.5">
          <span class="text-sub font-medium">开发</span>
          <svg class="w-3.5 h-3.5 stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 16 16"><path d="M3 8h10M9.5 4.5 13 8l-3.5 3.5"/></svg>
          <span class="text-sub font-medium">测试</span>
          <span class="text-hint">· 交付审查</span>
        </span>
        <span class="flex-1 h-px bg-line"></span>
      </div>
    </div>

    <div class="specimen">
      <div class="cap">测试 → 开发 · 交回实现</div>
      <div class="flex items-center gap-2 my-3.5 text-hint text-xs">
        <span class="flex-1 h-px bg-line"></span>
        <span class="inline-flex items-center gap-1.5">
          <span class="text-sub font-medium">测试</span>
          <svg class="w-3.5 h-3.5 stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 16 16"><path d="M3 8h10M9.5 4.5 13 8l-3.5 3.5"/></svg>
          <span class="text-sub font-medium">开发</span>
          <span class="text-hint">· 交回实现</span>
        </span>
        <span class="flex-1 h-px bg-line"></span>
      </div>
    </div>

    <!-- 接棒方是「你」：唯一用 accent 的地方 -->
    <div class="specimen">
      <div class="cap">CEO → 你 · 请你确认提案（接棒方「你」用 accent）</div>
      <div class="flex items-center gap-2 my-3.5 text-hint text-xs">
        <span class="flex-1 h-px bg-line"></span>
        <span class="inline-flex items-center gap-1.5">
          <span class="text-sub font-medium">CEO</span>
          <svg class="w-3.5 h-3.5 stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 16 16"><path d="M3 8h10M9.5 4.5 13 8l-3.5 3.5"/></svg>
          <span class="text-accent font-medium">你</span>
          <span class="text-hint">· 请你确认提案</span>
        </span>
        <span class="flex-1 h-px bg-line"></span>
      </div>
    </div>

    <!-- 语境样本：两条消息占位块之间夹一条 handoff -->
    <div class="specimen">
      <div class="cap">语境：夹在两条消息之间</div>
      <div class="w-full">

        <!-- 上一条消息占位 -->
        <div class="flex items-start gap-2.5">
          <span class="w-[26px] h-[26px] shrink-0 rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">开</span>
          <div class="flex-1 min-w-0 space-y-1.5 pt-1">
            <span class="block h-2 rounded-full bg-sunken w-[70%]"></span>
            <span class="block h-2 rounded-full bg-sunken w-[45%]"></span>
          </div>
        </div>

        <!-- 交棒节点 -->
        <div class="flex items-center gap-2 my-3.5 text-hint text-xs">
          <span class="flex-1 h-px bg-line"></span>
          <span class="inline-flex items-center gap-1.5">
            <span class="text-sub font-medium">开发</span>
            <svg class="w-3.5 h-3.5 stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 16 16"><path d="M3 8h10M9.5 4.5 13 8l-3.5 3.5"/></svg>
            <span class="text-sub font-medium">测试</span>
            <span class="text-hint">· 交付审查</span>
          </span>
          <span class="flex-1 h-px bg-line"></span>
        </div>

        <!-- 下一条消息占位 -->
        <div class="flex items-start gap-2.5">
          <span class="w-[26px] h-[26px] shrink-0 rounded-full bg-ava-bg text-ava-fg text-xs font-semibold flex items-center justify-center">测</span>
          <div class="flex-1 min-w-0 space-y-1.5 pt-1">
            <span class="block h-2 rounded-full bg-sunken w-[60%]"></span>
            <span class="block h-2 rounded-full bg-sunken w-[38%]"></span>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
