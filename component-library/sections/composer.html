<section class="spec" data-component="composer" id="composer">
  <header class="spec-h">
    <h2>输入区</h2><code>?only=composer</code>
    <p>主视图底部常驻的输入框：@ 一个角色开始或交棒，发送在框内右侧。框下常驻一行「现在发消息会怎样」的等待状态文案，消除「说话会不会打断它」的顾虑。</p>
  </header>
  <div class="spec-stage">
    <div class="stage-col max-w-[640px] gap-5">

      <!-- ① 默认 -->
      <div class="specimen">
        <div class="cap">默认</div>
        <div class="bg-card border border-line-strong rounded-lg pl-3.5 pr-1.5 py-1.5 flex items-center gap-2">
          <span class="text-hint text-[13px]">@ 输入消息，@角色 交棒…</span>
          <button class="ml-auto bg-card border border-line text-sub rounded-md px-3 py-1.5 text-xs">发送</button>
        </div>
      </div>

      <!-- ② 聚焦 -->
      <div class="specimen">
        <div class="cap">聚焦（边框转 accent）</div>
        <div class="bg-card border border-accent rounded-lg pl-3.5 pr-1.5 py-1.5 flex items-center gap-2">
          <span class="text-hint text-[13px]">@ 输入消息，@角色 交棒…</span>
          <button class="ml-auto bg-card border border-line text-sub rounded-md px-3 py-1.5 text-xs">发送</button>
        </div>
      </div>

      <!-- ③ 运行中 -->
      <div class="specimen">
        <div class="cap">运行中（发消息不打断）</div>
        <div class="bg-card border border-line-strong rounded-lg pl-3.5 pr-1.5 py-1.5 flex items-center gap-2">
          <span class="text-hint text-[13px]">@ 输入消息，@角色 交棒…</span>
          <button class="ml-auto bg-card border border-line text-sub rounded-md px-3 py-1.5 text-xs">发送</button>
        </div>
        <div class="mt-2 text-hint text-[11px] flex items-center gap-1.5">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-sub"></span>
          <span>发消息不会打断运行 · 开发在第 3 步</span>
        </div>
      </div>

      <!-- ④ 等你验收 -->
      <div class="specimen">
        <div class="cap">等你验收</div>
        <div class="bg-card border border-line-strong rounded-lg pl-3.5 pr-1.5 py-1.5 flex items-center gap-2">
          <span class="text-hint text-[13px]">@ 输入消息，@角色 交棒…</span>
          <button class="ml-auto bg-card border border-line text-sub rounded-md px-3 py-1.5 text-xs">发送</button>
        </div>
        <div class="mt-2 text-hint text-[11px] flex items-center gap-1.5">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-sub"></span>
          <span>等你验收，也可以先回复别的</span>
        </div>
      </div>

      <!-- ⑤ 空闲 -->
      <div class="specimen">
        <div class="cap">空闲</div>
        <div class="bg-card border border-line-strong rounded-lg pl-3.5 pr-1.5 py-1.5 flex items-center gap-2">
          <span class="text-hint text-[13px]">@ 输入消息，@角色 交棒…</span>
          <button class="ml-auto bg-card border border-line text-sub rounded-md px-3 py-1.5 text-xs">发送</button>
        </div>
        <div class="mt-2 text-hint text-[11px] flex items-center gap-1.5">
          <span class="inline-block w-2 h-2 rounded-full border-[1.5px] border-hint"></span>
          <span>空闲 · @ 一个角色开始</span>
        </div>
      </div>

    </div>
  </div>
</section>
