<section class="spec" data-component="empty-state" id="empty-state">
  <header class="spec-h">
    <h2>空态 / 新建会话</h2><code>?only=empty-state</code>
    <p>还没有任何会话时的中栏落地页：一句话说清「交给一组角色办事」，一个大输入框直接描述目标，下方给一条账本里等你验收的任务作为现成入口。</p>
  </header>
  <div class="spec-stage">
    <div class="stage-row gap-6">

      <!-- ① 默认 -->
      <div class="specimen">
        <div class="cap">默认</div>
        <div class="max-w-[560px] text-center">
          <div class="w-8 h-8 rounded-lg bg-accent mx-auto mb-4"></div>
          <h2 class="text-[17px] font-semibold text-ink">开始一个新会话</h2>
          <p class="text-sub text-[13px] mt-1">交给一组角色替你把事办成，你只需在关键处点头。</p>

          <div class="mt-5 bg-card border border-line rounded-xl pl-3.5 pr-1.5 py-1.5 flex items-center gap-2 text-left">
            <span class="text-hint text-[13px]">描述你的目标，@一个角色开始…</span>
            <button class="ml-auto bg-accent text-accent-fg rounded-lg px-3.5 py-2 text-[13px]">发送</button>
          </div>

          <div class="mt-5 text-left">
            <div class="text-hint text-xs mb-2">或从账本任务开始：</div>
            <div class="flex items-center gap-2.5 bg-card border border-line rounded-xl px-3.5 py-2.5 text-left">
              <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5] text-sub" style="stroke-linecap:round;stroke-linejoin:round"><use href="#i-doc"/></svg>
              <span class="text-ink text-[13px]">T3 失败汇总</span>
              <span class="inline-block w-1.5 h-1.5 rounded-full bg-sub"></span>
              <span class="text-sub text-xs">等你验收</span>
              <span class="ml-auto text-accent text-[13px]">打开会话</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ② 聚焦（输入框边框转 accent） -->
      <div class="specimen">
        <div class="cap">聚焦（输入框边框转 accent）</div>
        <div class="max-w-[560px] text-center">
          <div class="w-8 h-8 rounded-lg bg-accent mx-auto mb-4"></div>
          <h2 class="text-[17px] font-semibold text-ink">开始一个新会话</h2>
          <p class="text-sub text-[13px] mt-1">交给一组角色替你把事办成，你只需在关键处点头。</p>

          <div class="mt-5 bg-card border border-accent rounded-xl pl-3.5 pr-1.5 py-1.5 flex items-center gap-2 text-left">
            <span class="text-hint text-[13px]">描述你的目标，@一个角色开始…</span>
            <button class="ml-auto bg-accent text-accent-fg rounded-lg px-3.5 py-2 text-[13px]">发送</button>
          </div>

          <div class="mt-5 text-left">
            <div class="text-hint text-xs mb-2">或从账本任务开始：</div>
            <div class="flex items-center gap-2.5 bg-card border border-line rounded-xl px-3.5 py-2.5 text-left">
              <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5] text-sub" style="stroke-linecap:round;stroke-linejoin:round"><use href="#i-doc"/></svg>
              <span class="text-ink text-[13px]">T3 失败汇总</span>
              <span class="inline-block w-1.5 h-1.5 rounded-full bg-sub"></span>
              <span class="text-sub text-xs">等你验收</span>
              <span class="ml-auto text-accent text-[13px]">打开会话</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
