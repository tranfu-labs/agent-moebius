<section class="spec" data-component="breadcrumb" id="breadcrumb">
  <header class="spec-h">
    <h2>面包屑（属于某目标）</h2><code>?only=breadcrumb</code>
    <p>任务会话头部一行：左侧标明这条会话「属于」哪个目标、点击可返回父编排会话；右侧弱标注当前任务号与状态。全灰、无强调色。</p>
  </header>
  <div class="spec-stage">

    <div class="stage-col">

      <!-- 默认态 -->
      <div class="specimen">
        <div class="cap">默认</div>
        <div class="flex items-center">
          <span class="inline-flex items-center gap-1.5 text-sub px-2 py-1 rounded-md">
            <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round"><use href="#i-back"/></svg>
            <span class="text-[13px]">属于：目标 · 导出体验</span>
          </span>
          <span class="ml-auto text-hint text-xs">任务 T2 · 执行中</span>
        </div>
      </div>

      <!-- 悬停态 -->
      <div class="specimen">
        <div class="cap">悬停（左块高亮，点击返回父编排会话）</div>
        <div class="flex items-center">
          <span class="inline-flex items-center gap-1.5 bg-hover text-ink px-2 py-1 rounded-md">
            <svg class="w-[15px] h-[15px] stroke-current fill-none [stroke-width:1.5]" style="stroke-linecap:round;stroke-linejoin:round"><use href="#i-back"/></svg>
            <span class="text-[13px]">属于：目标 · 导出体验</span>
          </span>
          <span class="ml-auto text-hint text-xs">任务 T2 · 执行中</span>
        </div>
      </div>

    </div>

  </div>
</section>
