<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">T3 persistence after</title>
  <desc id="desc">After T3, local console and GitHub runner state share a session-keyed SQLite store.</desc>
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .store { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .table { fill: #ffffff; stroke: #059669; stroke-width: 1.5; rx: 6; }
      .text { font: 15px sans-serif; fill: #0f172a; }
      .small { font: 12px sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect x="40" y="60" width="210" height="90" class="box"/>
  <text x="70" y="100" class="text">Local console</text>
  <text x="70" y="125" class="small">local session key</text>

  <rect x="40" y="230" width="210" height="90" class="box"/>
  <text x="70" y="270" class="text">GitHub runner</text>
  <text x="70" y="295" class="small">github issue session key</text>

  <rect x="350" y="55" width="300" height="385" class="store"/>
  <text x="435" y="90" class="text">Unified SQLite state</text>
  <rect x="385" y="115" width="230" height="38" class="table"/>
  <text x="410" y="139" class="small">sessions + session_edges</text>
  <rect x="385" y="165" width="230" height="38" class="table"/>
  <text x="410" y="189" class="small">session_messages</text>
  <rect x="385" y="215" width="230" height="38" class="table"/>
  <text x="410" y="239" class="small">session_role_threads</text>
  <rect x="385" y="265" width="230" height="38" class="table"/>
  <text x="410" y="289" class="small">session_agent_contexts</text>
  <rect x="385" y="315" width="230" height="38" class="table"/>
  <text x="410" y="339" class="small">goal_ledger_documents</text>
  <rect x="385" y="365" width="230" height="38" class="table"/>
  <text x="410" y="389" class="small">github_intake_* tables</text>

  <rect x="725" y="145" width="190" height="90" class="box"/>
  <text x="765" y="185" class="text">Observer</text>
  <text x="765" y="210" class="small">read SQLite state</text>

  <rect x="725" y="285" width="190" height="90" class="box"/>
  <text x="765" y="325" class="text">Desktop shell</text>
  <text x="765" y="350" class="small">same data root</text>

  <path d="M250 105 H350" class="arrow"/>
  <path d="M250 275 H350" class="arrow"/>
  <path d="M650 190 H725" class="arrow"/>
  <path d="M650 330 H725" class="arrow"/>
</svg>
