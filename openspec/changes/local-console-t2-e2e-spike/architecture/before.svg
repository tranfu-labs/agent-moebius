<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Before local console T2">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #222222; stroke-width: 1.5; rx: 8; }
      .muted { fill: #f5f5f5; stroke: #777777; stroke-width: 1.2; rx: 8; }
      .text { font-family: Arial, sans-serif; font-size: 16px; fill: #111111; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #333333; }
      .arrow { stroke: #222222; stroke-width: 1.5; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222222"/>
    </marker>
  </defs>
  <rect x="30" y="40" width="160" height="70" class="box"/>
  <text x="110" y="70" text-anchor="middle" class="text">GitHub Issue</text>
  <text x="110" y="92" text-anchor="middle" class="small">input + timeline</text>

  <rect x="250" y="40" width="160" height="70" class="box"/>
  <text x="330" y="70" text-anchor="middle" class="text">GitHub Intake</text>
  <text x="330" y="92" text-anchor="middle" class="small">gh CLI polling</text>

  <rect x="470" y="40" width="170" height="70" class="box"/>
  <text x="555" y="70" text-anchor="middle" class="text">Runner Core</text>
  <text x="555" y="92" text-anchor="middle" class="small">conversation + trigger</text>

  <rect x="700" y="40" width="160" height="70" class="box"/>
  <text x="780" y="70" text-anchor="middle" class="text">Codex</text>
  <text x="780" y="92" text-anchor="middle" class="small">local CLI</text>

  <rect x="470" y="210" width="170" height="70" class="box"/>
  <text x="555" y="240" text-anchor="middle" class="text">GitHub Sink</text>
  <text x="555" y="262" text-anchor="middle" class="small">comment + reaction</text>

  <rect x="700" y="210" width="160" height="70" class="muted"/>
  <text x="780" y="240" text-anchor="middle" class="text">Observer</text>
  <text x="780" y="262" text-anchor="middle" class="small">read-only files</text>

  <path d="M190 75 L250 75" class="arrow"/>
  <path d="M410 75 L470 75" class="arrow"/>
  <path d="M640 75 L700 75" class="arrow"/>
  <path d="M780 110 L780 150 L555 150 L555 210" class="arrow"/>
  <path d="M470 245 L110 245 L110 110" class="arrow"/>
  <path d="M640 245 L700 245" class="arrow"/>
</svg>
