<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="760" height="520" fill="#ffffff"/>
  <text x="32" y="30" font-size="14" font-weight="700" fill="#111827">现状：Agent 团队没有接入执行链路</text>
  <text x="32" y="50" font-size="11" fill="#6b7280">团队体系与会话执行是两条互不相交的链，用户选择的团队只落到一条全局偏好文件</text>

  <rect x="32" y="70" width="330" height="196" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="48" y="92" font-size="12" font-weight="600" fill="#6b7280">团队链 · desktop/</text>

  <rect x="48" y="104" width="298" height="44" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="197" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">团队管理页 · console-page</text>
  <text x="197" y="139" text-anchor="middle" font-size="10" fill="#6b7280">浏览 / 编辑 AGENT.md</text>

  <rect x="48" y="162" width="298" height="44" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="197" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">team-ipc / team-record-store</text>
  <text x="197" y="197" text-anchor="middle" font-size="10" fill="#6b7280">两条路径解析并存，按 id 拼 vs 查记录</text>

  <rect x="48" y="218" width="298" height="36" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="197" y="241" text-anchor="middle" font-size="12" fill="#111827">&lt;dataRoot&gt;/teams/</text>

  <line x1="197" y1="148" x2="197" y2="160" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="197" y1="206" x2="197" y2="216" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="398" y="70" width="330" height="196" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="414" y="92" font-size="12" font-weight="600" fill="#6b7280">执行链 · src/local-console</text>

  <rect x="414" y="104" width="298" height="44" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="563" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">server.ts</text>
  <text x="563" y="139" text-anchor="middle" font-size="10" fill="#6b7280">listAgentFiles() 无参，desktop 未覆盖</text>

  <rect x="414" y="162" width="298" height="44" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="563" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">runtime.ts</text>
  <text x="563" y="197" text-anchor="middle" font-size="10" fill="#6b7280">扫全局名单，决定可 @ 的角色</text>

  <rect x="414" y="218" width="298" height="36" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="563" y="241" text-anchor="middle" font-size="12" fill="#111827">&lt;dataRoot&gt;/agents/　全局八个角色</text>

  <line x1="563" y1="148" x2="563" y2="160" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="563" y1="206" x2="563" y2="216" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="380" y="170" text-anchor="middle" font-size="26" fill="#dc2626">⊘</text>
  <text x="380" y="196" text-anchor="middle" font-size="10" fill="#dc2626">无连接</text>

  <rect x="32" y="290" width="696" height="76" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="48" y="312" font-size="12" font-weight="600" fill="#991b1b">断点一 · 存储侧没有绑定</text>
  <text x="48" y="332" font-size="11" fill="#7f1d1d">sessions 表无任何团队列；src/local-console 全目录对 team 零命中</text>
  <text x="48" y="352" font-size="11" fill="#7f1d1d">团队标识只写进 last-used-team.json 一条全局偏好，与具体会话无关</text>

  <rect x="32" y="380" width="696" height="112" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="48" y="402" font-size="12" font-weight="600" fill="#991b1b">断点二 · 界面侧张冠李戴</text>
  <text x="48" y="422" font-size="11" fill="#7f1d1d">app.tsx 把团队管理页的浏览选择态当作「当前会话的团队」传给操作台</text>

  <rect x="48" y="434" width="322" height="44" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="209" y="452" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">团队页点开坏团队</text>
  <text x="209" y="469" text-anchor="middle" font-size="10" fill="#dc2626">→ 所有会话输入框被禁用</text>

  <rect x="390" y="434" width="322" height="44" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="551" y="452" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">会话真正用的团队坏了</text>
  <text x="551" y="469" text-anchor="middle" font-size="10" fill="#dc2626">→ 照常放行发送</text>
</svg>
