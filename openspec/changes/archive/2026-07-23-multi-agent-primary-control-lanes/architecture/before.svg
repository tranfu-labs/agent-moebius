<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif; fill: #111827; }
    .title { font-size: 22px; font-weight: 600; }
    .label { font-size: 15px; font-weight: 600; }
    .sub { font-size: 12px; fill: #6b7280; }
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#5e6ad2"/></marker></defs>
  <rect width="960" height="520" fill="#fff"/>
  <text x="48" y="48" class="title">现状：session 级单车道与单 active run</text>
  <rect x="54" y="110" width="190" height="74" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="149" y="141" text-anchor="middle" class="label">composer 消息</text>
  <text x="149" y="163" text-anchor="middle" class="sub">可能直接 mention 任意成员</text>
  <rect x="350" y="94" width="260" height="106" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="480" y="130" text-anchor="middle" class="label">processingSessions</text>
  <text x="480" y="153" text-anchor="middle" class="sub">每 session 一个 drain / cursor</text>
  <text x="480" y="174" text-anchor="middle" class="sub">等待当前 Codex 完成才继续</text>
  <rect x="716" y="110" width="190" height="74" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="811" y="141" text-anchor="middle" class="label">activeRun</text>
  <text x="811" y="163" text-anchor="middle" class="sub">每 session 只有一个</text>
  <path d="M244 147H350" stroke="#5e6ad2" stroke-width="2" marker-end="url(#a)"/>
  <path d="M610 147H716" stroke="#5e6ad2" stroke-width="2" marker-end="url(#a)"/>
  <rect x="350" y="290" width="260" height="92" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="480" y="326" text-anchor="middle" class="label">唯一 Codex CLI</text>
  <text x="480" y="349" text-anchor="middle" class="sub">主理人或某个专业成员</text>
  <path d="M480 200V290" stroke="#5e6ad2" stroke-width="2" marker-end="url(#a)"/>
  <rect x="350" y="432" width="260" height="54" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="480" y="465" text-anchor="middle" class="label">composer 方形按钮停“当前成员”</text>
  <path d="M480 382V432" stroke="#5e6ad2" stroke-width="2" marker-end="url(#a)"/>
</svg>
