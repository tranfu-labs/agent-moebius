<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Before CEO orchestration T3">
  <style>
    text { font-family: Arial, sans-serif; font-size: 14px; fill: #17202a; }
    .title { font-size: 18px; font-weight: 700; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 6; }
    .muted { fill: #64748b; font-size: 12px; }
    .arrow { stroke: #334155; stroke-width: 1.6; marker-end: url(#arrow); fill: none; }
    .blocked { stroke: #b91c1c; stroke-width: 2; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrow-red); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#b91c1c"/>
    </marker>
  </defs>
  <text x="32" y="34" class="title">Before T3: CEO is guardrail only</text>
  <rect x="40" y="74" width="170" height="72" class="box"/>
  <text x="62" y="104">latest issue message</text>
  <text x="62" y="126" class="muted">@dev / @qa / ...</text>
  <rect x="284" y="74" width="190" height="72" class="box"/>
  <text x="310" y="104">mention trigger</text>
  <text x="310" y="126" class="muted">filters out ceo</text>
  <rect x="548" y="74" width="170" height="72" class="box"/>
  <text x="574" y="104">Codex agent</text>
  <text x="574" y="126" class="muted">role thread</text>
  <path d="M210 110 H284" class="arrow"/>
  <path d="M474 110 H548" class="arrow"/>
  <path d="M126 146 C126 230 330 230 330 146" class="blocked"/>
  <text x="96" y="258" fill="#b91c1c">@ceo does not trigger Codex</text>
  <rect x="548" y="218" width="190" height="76" class="box"/>
  <text x="574" y="248">format-ceo.ts</text>
  <text x="574" y="270" class="muted">stateless fail-open</text>
  <path d="M632 146 V218" class="arrow"/>
  <rect x="770" y="218" width="118" height="76" class="box"/>
  <text x="788" y="248">GitHub</text>
  <text x="788" y="270" class="muted">comment only</text>
  <path d="M738 256 H770" class="arrow"/>
</svg>
