<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-sans-serif, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">现状 · runner tick 的三处死循环</text>
  <text x="480" y="52" text-anchor="middle" font-size="13" fill="#475569">红色回路 = 每 60s 复现的循环点</text>

  <!-- tick -->
  <rect x="410" y="80" width="140" height="44" rx="22" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="480" y="107" text-anchor="middle" font-size="13" fill="#1e1b4b">tick 1 min</text>

  <!-- getDue -->
  <rect x="360" y="150" width="240" height="46" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="480" y="178" text-anchor="middle" font-size="13" fill="#0f172a">getDueActiveIssueSources</text>

  <!-- pollActiveIssue -->
  <rect x="320" y="222" width="320" height="70" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="480" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">pollActiveIssue</text>
  <text x="480" y="266" text-anchor="middle" font-size="12" fill="#334155">fetchIssueWithComments (JSON: body,comments,updatedAt)</text>
  <text x="480" y="282" text-anchor="middle" font-size="12" fill="#dc2626">★C · 无 state 字段，感知不到 CLOSED</text>

  <!-- updatedAt changed -->
  <polygon points="480,318 560,358 480,398 400,358" fill="#fef3c7" stroke="#b45309"/>
  <text x="480" y="356" text-anchor="middle" font-size="12" fill="#78350f">updatedAt 与</text>
  <text x="480" y="372" text-anchor="middle" font-size="12" fill="#78350f">state 里不同？</text>

  <!-- processIssueSource -->
  <rect x="320" y="424" width="320" height="70" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="480" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">processIssueSource → dev prescript</text>
  <text x="480" y="470" text-anchor="middle" font-size="12" fill="#dc2626">★B · containsLatestMain=false → 直接 fail</text>
  <text x="480" y="486" text-anchor="middle" font-size="12" fill="#334155">reason = "stale-worktree-base"</text>

  <!-- record failed -->
  <rect x="320" y="520" width="320" height="70" rx="6" fill="#fef2f2" stroke="#dc2626"/>
  <text x="480" y="546" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">recordIssueProcessingOutcome(failed)</text>
  <text x="480" y="566" text-anchor="middle" font-size="12" fill="#dc2626">★A · return input.state → nextPollAt 不推</text>
  <text x="480" y="582" text-anchor="middle" font-size="12" fill="#dc2626">     updatedAt 不同步 → 下 tick 又"到期+有变化"</text>

  <!-- arrows -->
  <line x1="480" y1="124" x2="480" y2="150" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="480" y1="196" x2="480" y2="222" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="480" y1="292" x2="480" y2="318" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="480" y1="398" x2="480" y2="424" stroke="#334155" marker-end="url(#arrow)"/>
  <text x="490" y="415" font-size="11" fill="#78350f">是</text>
  <line x1="480" y1="494" x2="480" y2="520" stroke="#334155" marker-end="url(#arrow)"/>

  <!-- back loop (red) -->
  <path d="M 640,555 C 800,555 800,102 550,102" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="810" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">state 未推进</text>
  <text x="810" y="346" text-anchor="middle" font-size="12" fill="#dc2626">→ 下 tick 又到期</text>

  <!-- closed issue leaks -->
  <path d="M 320,257 L 180,257 L 180,555 L 320,555" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="130" y="410" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">★C</text>
  <text x="130" y="426" text-anchor="middle" font-size="11" fill="#dc2626">CLOSED issue</text>
  <text x="130" y="442" text-anchor="middle" font-size="11" fill="#dc2626">仍在 active 池</text>
  <text x="130" y="458" text-anchor="middle" font-size="11" fill="#dc2626">被反复 poll</text>

  <!-- legend -->
  <rect x="700" y="150" width="220" height="130" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="810" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">循环点</text>
  <text x="712" y="196" font-size="11" fill="#dc2626">★A recordOutcome(failed) 空转</text>
  <text x="712" y="216" font-size="11" fill="#dc2626">★B stale-worktree 无自愈</text>
  <text x="712" y="236" font-size="11" fill="#dc2626">★C 不感知 CLOSED</text>
  <text x="712" y="262" font-size="11" fill="#475569">现象：60s 一次 trigger</text>
</svg>
