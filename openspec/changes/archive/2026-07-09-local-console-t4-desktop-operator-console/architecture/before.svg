<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <rect width="920" height="420" fill="#ffffff"/>
  <style>
    text { font-family: Arial, sans-serif; font-size: 15px; fill: #1f2937; }
    .title { font-size: 20px; font-weight: 700; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .muted { fill: #64748b; font-size: 13px; }
    .line { stroke: #475569; stroke-width: 1.8; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="36" y="42" class="title">Before T4</text>
  <rect x="40" y="80" width="210" height="92" class="box"/>
  <text x="62" y="116">Electron main window</text>
  <text x="62" y="144" class="muted">static status page</text>
  <rect x="350" y="80" width="220" height="92" class="box"/>
  <text x="374" y="116">Observer server</text>
  <text x="374" y="144" class="muted">read-only diagnostics</text>
  <line x1="250" y1="126" x2="350" y2="126" class="line"/>
  <rect x="40" y="240" width="210" height="92" class="box"/>
  <text x="62" y="276">Runner child</text>
  <text x="62" y="304" class="muted">starts local console too</text>
  <rect x="350" y="240" width="220" height="92" class="box"/>
  <text x="374" y="276">Local console HTTP</text>
  <text x="374" y="304" class="muted">single default session</text>
  <line x1="250" y1="286" x2="350" y2="286" class="line"/>
  <rect x="660" y="240" width="220" height="92" class="box"/>
  <text x="684" y="276">SQLite</text>
  <text x="684" y="304" class="muted">session_messages</text>
  <line x1="570" y1="286" x2="660" y2="286" class="line"/>
  <text x="40" y="374" class="muted">No desktop operator renderer, no multi-session UI, no live tail, no explicit interrupt API.</text>
</svg>
