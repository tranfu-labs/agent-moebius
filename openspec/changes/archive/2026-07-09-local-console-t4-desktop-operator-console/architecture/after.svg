<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460">
  <rect width="980" height="460" fill="#ffffff"/>
  <style>
    text { font-family: Arial, sans-serif; font-size: 15px; fill: #1f2937; }
    .title { font-size: 20px; font-weight: 700; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .accent { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.8; rx: 8; }
    .muted { fill: #64748b; font-size: 13px; }
    .line { stroke: #475569; stroke-width: 1.8; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="36" y="42" class="title">After T4</text>
  <rect x="40" y="80" width="230" height="104" class="accent"/>
  <text x="64" y="116">Electron main window</text>
  <text x="64" y="144" class="muted">React operator console</text>
  <text x="64" y="166" class="muted">diagnostics as auxiliary</text>
  <rect x="370" y="80" width="230" height="104" class="box"/>
  <text x="394" y="116">Preload narrow API</text>
  <text x="394" y="144" class="muted">state, send, interrupt</text>
  <line x1="270" y1="132" x2="370" y2="132" class="line"/>
  <rect x="700" y="80" width="230" height="104" class="box"/>
  <text x="724" y="116">Local console server</text>
  <text x="724" y="144" class="muted">owned by main process</text>
  <text x="724" y="166" class="muted">one project, many sessions</text>
  <line x1="600" y1="132" x2="700" y2="132" class="line"/>
  <rect x="700" y="250" width="230" height="104" class="box"/>
  <text x="724" y="286">SQLite</text>
  <text x="724" y="314" class="muted">sessions + messages</text>
  <text x="724" y="336" class="muted">interrupted, stuck, failed</text>
  <line x1="815" y1="184" x2="815" y2="250" class="line"/>
  <rect x="370" y="250" width="230" height="104" class="box"/>
  <text x="394" y="286">Codex driver</text>
  <text x="394" y="314" class="muted">stdout/stderr live tail</text>
  <text x="394" y="336" class="muted">AbortSignal interrupt</text>
  <line x1="700" y1="302" x2="600" y2="302" class="line"/>
  <rect x="40" y="250" width="230" height="104" class="box"/>
  <text x="64" y="286">Runner child</text>
  <text x="64" y="314" class="muted">GitHub heartbeat unchanged</text>
  <text x="64" y="336" class="muted">local server disabled</text>
  <text x="40" y="406" class="muted">Desktop renderer sees live run snapshots, can interrupt active runs, and shows visible local errors.</text>
</svg>
