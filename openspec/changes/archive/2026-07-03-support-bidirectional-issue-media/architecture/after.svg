<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">Proposed bidirectional issue media flow</title>
  <desc id="desc">The runner extracts media references, downloads and validates input media, passes images to Codex, exposes videos by local manifest, publishes generated artifacts, and posts preview markdown.</desc>
  <defs>
    <style>
      text { font-family: Arial, sans-serif; font-size: 14px; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .pure { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; rx: 8; }
      .io { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 8; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 12px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
  </defs>
  <rect class="box" x="35" y="70" width="145" height="70" />
  <text x="108" y="100" text-anchor="middle">GitHub issue</text>
  <text x="108" y="121" text-anchor="middle" class="label">body + comments</text>
  <rect class="pure" x="220" y="70" width="165" height="70" />
  <text x="303" y="100" text-anchor="middle">issue-media.ts</text>
  <text x="303" y="121" text-anchor="middle" class="label">pure references</text>
  <rect class="io" x="425" y="70" width="175" height="70" />
  <text x="513" y="100" text-anchor="middle">media-assets.ts</text>
  <text x="513" y="121" text-anchor="middle" class="label">download + validate</text>
  <rect class="box" x="650" y="70" width="145" height="70" />
  <text x="723" y="100" text-anchor="middle">codex.ts</text>
  <text x="723" y="121" text-anchor="middle" class="label">--image + manifest</text>
  <rect class="io" x="425" y="220" width="175" height="70" />
  <text x="513" y="250" text-anchor="middle">artifact publisher</text>
  <text x="513" y="271" text-anchor="middle" class="label">upload / preview links</text>
  <rect class="box" x="650" y="220" width="160" height="70" />
  <text x="730" y="250" text-anchor="middle">CEO guardrail</text>
  <text x="730" y="271" text-anchor="middle" class="label">publishable response</text>
  <rect class="box" x="850" y="220" width="105" height="70" />
  <text x="903" y="250" text-anchor="middle">Comment</text>
  <text x="903" y="271" text-anchor="middle" class="label">preview md</text>
  <path class="arrow" d="M180 105 H220" />
  <path class="arrow" d="M385 105 H425" />
  <path class="arrow" d="M600 105 H650" />
  <path class="arrow" d="M723 140 V188 C723 210 650 218 600 238" />
  <path class="arrow" d="M600 255 H650" />
  <path class="arrow" d="M810 255 H850" />
  <rect class="warn" x="55" y="225" width="290" height="58" />
  <text x="200" y="249" text-anchor="middle">Failure paths post visible error comments</text>
  <text x="200" y="270" text-anchor="middle" class="label">No silent media loss, no role thread update</text>
</svg>
