<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Runner Codex Driver Pool Architecture (limit=5)</title>
  <desc id="desc">Runner converts due issues into jobs, the codex driver pool executes at most 5 concurrently with the rest queued, and runner folds results into intake state deterministically.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
  </defs>
  <rect width="920" height="360" fill="#f8fafc" />
  <g font-family="Arial, sans-serif" font-size="14" fill="#0f172a">
    <rect x="20" y="70" width="180" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" />
    <text x="110" y="104" text-anchor="middle" font-weight="700">runner tick</text>
    <text x="110" y="126" text-anchor="middle">build changed / active</text>
    <text x="110" y="146" text-anchor="middle">issue jobs</text>

    <rect x="240" y="40" width="320" height="150" rx="8" fill="#dcfce7" stroke="#16a34a" />
    <text x="400" y="66" text-anchor="middle" font-weight="700">codex driver pool</text>
    <text x="400" y="84" text-anchor="middle" font-size="12">default: 5 concurrent slots</text>

    <rect x="256" y="98" width="48" height="40" rx="4" fill="#bbf7d0" stroke="#15803d" />
    <text x="280" y="122" text-anchor="middle" font-size="12">slot 1</text>
    <rect x="312" y="98" width="48" height="40" rx="4" fill="#bbf7d0" stroke="#15803d" />
    <text x="336" y="122" text-anchor="middle" font-size="12">slot 2</text>
    <rect x="368" y="98" width="48" height="40" rx="4" fill="#bbf7d0" stroke="#15803d" />
    <text x="392" y="122" text-anchor="middle" font-size="12">slot 3</text>
    <rect x="424" y="98" width="48" height="40" rx="4" fill="#bbf7d0" stroke="#15803d" />
    <text x="448" y="122" text-anchor="middle" font-size="12">slot 4</text>
    <rect x="480" y="98" width="48" height="40" rx="4" fill="#bbf7d0" stroke="#15803d" />
    <text x="504" y="122" text-anchor="middle" font-size="12">slot 5</text>

    <rect x="256" y="150" width="272" height="30" rx="4" fill="#fef9c3" stroke="#ca8a04" />
    <text x="392" y="170" text-anchor="middle" font-size="12">queue (FIFO, waits for a free slot)</text>

    <rect x="610" y="30" width="230" height="52" rx="8" fill="#e2e8f0" stroke="#64748b" />
    <text x="725" y="52" text-anchor="middle" font-weight="700">issue job #1</text>
    <text x="725" y="70" text-anchor="middle" font-size="12">fetch + trigger + Codex</text>

    <rect x="610" y="94" width="230" height="52" rx="8" fill="#e2e8f0" stroke="#64748b" />
    <text x="725" y="116" text-anchor="middle" font-weight="700">issue job #2..#5</text>
    <text x="725" y="134" text-anchor="middle" font-size="12">concurrent, up to 5</text>

    <rect x="610" y="158" width="230" height="52" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4 4" />
    <text x="725" y="180" text-anchor="middle" font-weight="700">issue job #6..</text>
    <text x="725" y="198" text-anchor="middle" font-size="12">queued, waits for slot</text>

    <rect x="240" y="240" width="220" height="70" rx="8" fill="#fef3c7" stroke="#d97706" />
    <text x="350" y="270" text-anchor="middle" font-weight="700">deterministic fold</text>
    <text x="350" y="292" text-anchor="middle">job outcomes -&gt; intake state</text>

    <rect x="600" y="242" width="240" height="68" rx="8" fill="#f1f5f9" stroke="#475569" />
    <text x="720" y="271" text-anchor="middle" font-weight="700">entry-level state merge</text>
    <text x="720" y="293" text-anchor="middle">role threads + contexts</text>

    <path d="M200 113 L240 113" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M560 108 L610 56" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M560 118 L610 120" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M560 165 L610 182" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M725 146 L400 240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M460 275 L600 275" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  </g>
</svg>
