<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', sans-serif">
  <title id="title">现状触发架构 — 跨轮才能触发 reflector</title>
  <desc id="desc">runner 每分钟一次 tick；processIssueSource 单次只跑一次 resolveTrigger；dev 自己写的 stage 评论要等下一轮 active poll 才会被识别。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6b6b"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <style>
    .box { fill: #ffffff; stroke: #d4d4d4; stroke-width: 1.2; rx: 8; }
    .box-accent { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
    .box-muted { fill: #f5f5f5; stroke: #d4d4d4; stroke-width: 1; rx: 8; }
    .label { fill: #1f1f1f; font-size: 13px; font-weight: 600; }
    .sub { fill: #6b6b6b; font-size: 11px; }
    .accent { fill: #c2410c; font-size: 11px; font-weight: 600; }
    .edge { stroke: #6b6b6b; stroke-width: 1.4; fill: none; }
    .edge-accent { stroke: #c2410c; stroke-width: 1.6; fill: none; stroke-dasharray: 6 4; }
    .swim { fill: #f8f8f8; stroke: #e5e5e5; stroke-width: 1; rx: 10; }
    .swim-label { fill: #6b6b6b; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
    .title { fill: #1f1f1f; font-size: 15px; font-weight: 700; }
  </style>

  <text class="title" x="20" y="28">现状：trigger 在单轮里只解析一次，stage hook 要跨轮才能出</text>

  <rect class="swim" x="20" y="50" width="860" height="240"/>
  <text class="swim-label" x="36" y="72">第 N 轮 tick (T = 0:00)</text>

  <rect class="box" x="40" y="90" width="160" height="64"/>
  <text class="label" x="120" y="118" text-anchor="middle">runner.tick</text>
  <text class="sub" x="120" y="136" text-anchor="middle">setInterval 1 min</text>

  <rect class="box" x="230" y="90" width="170" height="64"/>
  <text class="label" x="315" y="118" text-anchor="middle">pollActiveIssue</text>
  <text class="sub" x="315" y="136" text-anchor="middle">fetch issue updatedAt</text>

  <rect class="box" x="430" y="90" width="200" height="64"/>
  <text class="label" x="530" y="118" text-anchor="middle">processIssueSource</text>
  <text class="sub" x="530" y="136" text-anchor="middle">buildTimeline + 一次 resolveTrigger</text>

  <rect class="box" x="660" y="90" width="200" height="64"/>
  <text class="label" x="760" y="118" text-anchor="middle">resolveMentionTrigger 命中</text>
  <text class="sub" x="760" y="136" text-anchor="middle">latest = user "@dev …"</text>

  <rect class="box" x="230" y="186" width="170" height="64"/>
  <text class="label" x="315" y="214" text-anchor="middle">runCodex (dev)</text>
  <text class="sub" x="315" y="232" text-anchor="middle">prescript + codex CLI</text>

  <rect class="box" x="430" y="186" width="200" height="64"/>
  <text class="label" x="530" y="214" text-anchor="middle">postComment</text>
  <text class="sub" x="530" y="232" text-anchor="middle">plan-written 评论入 issue</text>

  <rect class="box-muted" x="660" y="186" width="200" height="64"/>
  <text class="label" x="760" y="214" text-anchor="middle">return triggered-success</text>
  <text class="accent" x="760" y="232" text-anchor="middle">本轮不再 resolveTrigger</text>

  <path class="edge" d="M 200 122 H 230" marker-end="url(#arrow)"/>
  <path class="edge" d="M 400 122 H 430" marker-end="url(#arrow)"/>
  <path class="edge" d="M 630 122 H 660" marker-end="url(#arrow)"/>
  <path class="edge" d="M 760 154 V 175 H 315 V 186" marker-end="url(#arrow)"/>
  <path class="edge" d="M 400 218 H 430" marker-end="url(#arrow)"/>
  <path class="edge" d="M 630 218 H 660" marker-end="url(#arrow)"/>

  <text class="accent" x="450" y="312" text-anchor="middle">▼ 等 1 分钟（active poll 间隔）— 这段时间里 stage 评论已经在 GitHub 上但无人识别</text>

  <rect class="swim" x="20" y="330" width="860" height="240"/>
  <text class="swim-label" x="36" y="352">第 N+1 轮 tick (T = 1:00)</text>

  <rect class="box" x="40" y="370" width="160" height="64"/>
  <text class="label" x="120" y="398" text-anchor="middle">runner.tick</text>
  <text class="sub" x="120" y="416" text-anchor="middle">next interval</text>

  <rect class="box" x="230" y="370" width="170" height="64"/>
  <text class="label" x="315" y="398" text-anchor="middle">pollActiveIssue</text>
  <text class="sub" x="315" y="416" text-anchor="middle">updatedAt 变了</text>

  <rect class="box" x="430" y="370" width="200" height="64"/>
  <text class="label" x="530" y="398" text-anchor="middle">processIssueSource</text>
  <text class="sub" x="530" y="416" text-anchor="middle">这次拉到 dev 的 plan-written</text>

  <rect class="box-accent" x="660" y="370" width="200" height="64"/>
  <text class="label" x="760" y="398" text-anchor="middle">resolveReflectorStageTrigger</text>
  <text class="accent" x="760" y="416" text-anchor="middle">命中 → post hook 评论</text>

  <rect class="box-muted" x="230" y="466" width="430" height="56"/>
  <text class="label" x="445" y="490" text-anchor="middle">postComment(reflector hook) → 写回 issue</text>
  <text class="sub" x="445" y="506" text-anchor="middle">stage-hook metadata 用于后续去重</text>

  <path class="edge" d="M 200 402 H 230" marker-end="url(#arrow)"/>
  <path class="edge" d="M 400 402 H 430" marker-end="url(#arrow)"/>
  <path class="edge" d="M 630 402 H 660" marker-end="url(#arrow)"/>
  <path class="edge-accent" d="M 760 434 V 455 H 445 V 466" marker-end="url(#arrow-accent)"/>

  <text class="accent" x="450" y="600" text-anchor="middle">痛点：dev 写完到 reflector hook 出现，至少差 1 个 tick；runner 这期间挂了 → 永远不出</text>
</svg>
