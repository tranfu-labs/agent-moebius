<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">After goal-intake T8</title>
  <desc id="desc">After T8, target-shaped no-mention messages route to CEO, CEO can interview, propose pending ledger state, confirm, activate phase one, and reuse spawn.</desc>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; fill: #17212b; }
    .box { fill: #f7f9fb; stroke: #627386; stroke-width: 1.5; rx: 6; }
    .new { fill: #eefaf4; stroke: #2d8f61; stroke-width: 1.5; rx: 6; }
    .guard { fill: #fff9e8; stroke: #a97d20; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #485867; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .label { font-size: 12px; fill: #52616f; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#485867"/>
    </marker>
  </defs>
  <rect class="box" x="38" y="48" width="190" height="82"/>
  <text x="60" y="83">No-mention message</text>
  <text class="label" x="60" y="105">issue body or comment</text>
  <rect class="new" x="278" y="48" width="210" height="82"/>
  <text x="300" y="83">fallback route</text>
  <text class="label" x="300" y="105">append one @ceo</text>
  <rect class="new" x="548" y="48" width="250" height="82"/>
  <text x="570" y="83">intake bootstrap context</text>
  <text class="label" x="570" y="105">goal_intake only</text>
  <rect class="new" x="88" y="210" width="200" height="82"/>
  <text x="110" y="245">interview</text>
  <text class="label" x="110" y="267">2-4 questions, no ledger</text>
  <rect class="new" x="338" y="210" width="220" height="82"/>
  <text x="360" y="245">propose</text>
  <text class="label" x="360" y="267">pending ledger + proposal key</text>
  <rect class="new" x="608" y="210" width="220" height="82"/>
  <text x="630" y="245">confirm</text>
  <text class="label" x="630" y="267">ready + active phase one</text>
  <rect class="box" x="338" y="370" width="220" height="82"/>
  <text x="360" y="405">goal-ledger pure helpers</text>
  <text class="label" x="360" y="427">no GitHub / shell / Codex</text>
  <rect class="guard" x="608" y="370" width="220" height="82"/>
  <text x="630" y="405">shared spawn executor</text>
  <text class="label" x="630" y="427">T3 keys and fail-closed</text>
  <path class="arrow" d="M228 89 H278"/>
  <path class="arrow" d="M488 89 H548"/>
  <path class="arrow" d="M673 130 V210"/>
  <path class="arrow" d="M548 251 H558"/>
  <path class="arrow" d="M288 251 H338"/>
  <path class="arrow" d="M448 292 V370"/>
  <path class="arrow" d="M718 292 V370"/>
  <path class="arrow" d="M558 411 H608"/>
</svg>
