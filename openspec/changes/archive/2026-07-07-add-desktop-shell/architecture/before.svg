<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#ffffff"/>
  <text x="40" y="28" font-size="14" font-weight="700" fill="#111827">现状：两个终端进程手动运行</text>

  <rect x="40" y="48" width="280" height="140" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="56" y="72" font-size="13" font-weight="600" fill="#6b7280">终端 1 · pnpm start</text>
  <rect x="56" y="84" width="248" height="88" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="180" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">runner 常驻进程</text>
  <text x="180" y="132" text-anchor="middle" font-size="11" fill="#6b7280">每分钟心跳 · 扫描派发</text>
  <text x="180" y="150" text-anchor="middle" font-size="11" fill="#6b7280">驱动 codex 子进程</text>

  <rect x="360" y="48" width="280" height="140" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="376" y="72" font-size="13" font-weight="600" fill="#6b7280">终端 2 · pnpm observer</text>
  <rect x="376" y="84" width="248" height="88" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="500" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">observer 只读页</text>
  <text x="500" y="132" text-anchor="middle" font-size="11" fill="#6b7280">127.0.0.1:8787</text>
  <text x="500" y="150" text-anchor="middle" font-size="11" fill="#6b7280">浏览器手动访问</text>

  <rect x="40" y="252" width="280" height="108" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="56" y="276" font-size="13" font-weight="600" fill="#6b7280">本机 CLI 依赖</text>
  <rect x="56" y="290" width="118" height="52" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="115" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">codex</text>
  <text x="115" y="330" text-anchor="middle" font-size="10" fill="#6b7280">需在 PATH 中</text>
  <rect x="186" y="290" width="118" height="52" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="245" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">gh</text>
  <text x="245" y="330" text-anchor="middle" font-size="10" fill="#6b7280">需已登录</text>

  <rect x="360" y="252" width="280" height="108" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="376" y="276" font-size="13" font-weight="600" fill="#6b7280">仓库目录（克隆 + pnpm install 前提）</text>
  <rect x="376" y="290" width="118" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="435" y="307" text-anchor="middle" font-size="11" fill="#6b7280">config.local.toml</text>
  <rect x="506" y="290" width="118" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="565" y="307" text-anchor="middle" font-size="11" fill="#6b7280">.state/</text>
  <rect x="376" y="324" width="248" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="500" y="341" text-anchor="middle" font-size="11" fill="#6b7280">同级 moebius-workdir</text>

  <path d="M180 188 V252" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="188" y="226" font-size="10" fill="#6b7280">spawn</text>
  <path d="M304 172 L410 252" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="330" y="226" font-size="10" fill="#6b7280">读写状态</text>
  <path d="M500 188 V252" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="508" y="226" font-size="10" fill="#6b7280">只读</text>
</svg>
