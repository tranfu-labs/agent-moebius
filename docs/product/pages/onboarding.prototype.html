anel>p{margin:10px 0 0;line-height:1.4}@media (max-width: 850px){.conversation-layout{grid-template-columns:178px minmax(0,1fr)}.conversation-inspector{display:none}.onboarding-stage{padding-top:32px}}@media (max-width: 640px){body{overflow:auto}.prototype-chrome{grid-template-columns:1fr auto;padding:0 14px}.traffic-lights{display:none}.brand-mark{justify-self:start}.prototype-label{justify-self:end}.onboarding-stage{justify-content:flex-start;padding:34px 18px 28px}.stage-heading h1{font-size:26px}.stage-heading p{font-size:12px}.stage-content{margin-top:24px}.onboarding-footer{position:sticky;bottom:0;padding:12px 16px}.footer-inner{align-items:flex-end;gap:12px}.footer-actions{gap:7px}.footer-actions .prototype-button{min-height:38px;padding:0 13px}.step-count{display:none}.status-row{grid-template-columns:auto 1fr}.status-row .pill{display:none}.team-members{align-items:stretch;flex-direction:column;margin-left:30px}.team-builder{height:auto;min-height:580px}.team-builder__header>.pill{display:none}.builder-message{max-width:96%}.team-proposal{margin-left:0}.proposal-handoff{flex-wrap:wrap}.proposal-actions{align-items:stretch;flex-direction:column-reverse}.created-team-card__foot{align-items:flex-start;flex-direction:column}.relay-card{--graph-column-width: 28px}.relay-grid-heading,.relay-goal-row,.relay-msg,.relay-typing{gap:10px}.relay-grid-heading,.relay-goal-row{padding-right:12px;padding-left:12px}.relay-role-columns b{display:block;font-size:9px}.relay-role-columns small{display:none}.relay-timeline{max-height:320px}.relay-history{padding:0 12px 10px}.relay-msg{min-height:108px}.relay-msg__head{align-items:flex-start;flex-wrap:wrap}.relay-msg__head .pill{margin-left:0}.review-controls{right:10px;bottom:72px}.review-trigger span{display:none}.review-trigger{width:35px;padding:0;justify-content:center}.conversation-layout{grid-template-columns:1fr}.conversation-sidebar{display:none}.conversation-main{min-height:calc(100dvh - 52px);padding:28px 18px}}@media   <body>
    <!--
      设计原型，非正式产品实现。
      产品事实源：docs/product/pages/onboarding.md
    -->
    <div id="root" data-prototype="onboarding"></div>
    <style>
      /* 第一轮文案评审：仅覆盖环境准备页，不改动原型源码。 */
      .environment-card:not(.environment-card--error) .ready-note {
        display: none;
      }

      .environment-card--error .missing-foot:empty {
        display: none;
      }

      .team-list > button.team-card > p {
        display: none;
      }

      .team-builder__header > div > span,
      .team-builder__header > .pill,
      .team-proposal code,
      .team-proposal .proposal-handoff,
      .created-team-card__foot > p,
      .copy-hidden {
        display: none !important;
      }

      .copy-collaboration {
        border-top: 1px solid var(--border);
        background: var(--raised);
        padding: 11px 13px;
      }

      .copy-collaboration > span {
        color: var(--faint);
        font-size: 8px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .copy-collaboration > p {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 9px;
        line-height: 1.55;
      }

      .copy-collaboration > small {
        display: block;
        margin-top: 5px;
        color: var(--faint);
        font-size: 8px;
      }

    </style>
    <script>
      (() => {
        const environmentCopy = new Map([
          ["环境准备", "设置 Codex"],
          [
            "agent-moebius 用 codex 来运行每一位团队成员",
            "Agent 团队通过 Codex 在这台电脑上运行"
          ],
          ["codex 已安装", "Codex 已安装"],
          ["已在本机找到命令", "已在这台电脑上找到"],
          ["codex 可以运行", "Codex 可以运行"],
          ["团队成员已经可以开始工作", "Agent 团队可以正常启动"],
          ["没有找到 codex", "未找到 Codex"],
          [
            "先在终端里安装，完成后回到这里重新检查。",
            "在终端运行以下命令，然后重新检查"
          ],
          ["环境通过前不会进入下一步", ""],
          ["正在重新确认本机环境…", "正在检查 Codex…"]
        ]);

        const teamSelectionCopy = new Map([
          ["选择一支团队", "选择团队"],
          [
            "先选一支最接近你当前工作的团队，之后随时可以切换",
            "选择最适合你工作的团队，稍后可以更改"
          ],
          ["软件内置", "规划、开发、审查与验收软件项目"],
          ["跟 AI 聊出一支新团队", "使用 AI 创建团队"],
          [
            "只说目标，AI 会追问、组队并说明怎么接力",
            "描述工作目标，获得成员和分工建议"
          ],
          ["开始对话", "开始创建"]
        ]);

        const teamBuilderCopy = new Map([
          ["AI 团队设计器", "创建团队"],
          [
            "你希望这支团队长期替你完成什么工作？",
            "你想让这支团队负责什么工作？"
          ],
          [
            "先说目标就好，不需要想好角色和分工。",
            "描述目标即可，不需要预先安排成员和分工"
          ],
          [
            "希望每次产品发布时，有人统筹内容、渠道和排期。",
            "帮我持续做产品发布，从资料研究、内容撰写到上线前复核。"
          ],
          ["团队提案 · 3 名成员", "团队方案 · 4 名成员"],
          ["AI 生成", "草稿"],
          ["继续聊着调整", "调整方案"],
          ["创建并选中", "创建团队"]
        ]);

        const setText = (element, value) => {
          if (element && element.textContent !== value) {
            element.textContent = value;
          }
        };

        const setLeadingText = (element, value) => {
          if (!element) return;
          const textNode = Array.from(element.childNodes).find(
            (node) => node.nodeType === Node.TEXT_NODE
          );
          if (textNode && textNode.nodeValue.trim() !== value) {
            textNode.nodeValue = value;
          }
        };

        const applyEnvironmentCopy = () => {
          const step = document.querySelector('[data-testid="step-1"]');
          if (!step) return;

          const walker = document.createTreeWalker(step, NodeFilter.SHOW_TEXT);
          let node;
          while ((node = walker.nextNode())) {
            const replacement = environmentCopy.get(node.nodeValue.trim());
            if (replacement !== undefined) {
              node.nodeValue = replacement;
            }
          }

          const progress = step.querySelector(
            '[aria-label="正在检查本机环境"]'
          );
          if (progress) {
            progress.setAttribute("aria-label", "正在检查 Codex");
          }
        };

        const applyTeamSelectionCopy = () => {
          const step = document.querySelector('[data-testid="step-2"]');
          if (!step) return;

          const walker = document.createTreeWalker(step, NodeFilter.SHOW_TEXT);
          let node;
          while ((node = walker.nextNode())) {
            const source = node.nodeValue.trim();
            const replacement =
              teamSelectionCopy.get(source) ?? teamBuilderCopy.get(source);
            if (replacement !== undefined) {
              node.nodeValue = replacement;
            }
          }

          const builder = step.querySelector('[data-testid="team-builder"]');
          if (builder) {
            const goalInput = builder.querySelector(
              '[data-testid="builder-goal"]'
            );
            const revisedGoal =
              "帮我持续做产品发布，从资料研究、内容撰写到上线前复核。";
            if (
              goalInput &&
              goalInput.value !== revisedGoal &&
              !builder.dataset.copyGoalApplied
            ) {
              builder.dataset.copyGoalApplied = "true";
              const valueSetter = Object.getOwnPropertyDescriptor(
                HTMLTextAreaElement.prototype,
                "value"
              )?.set;
              valueSetter?.call(goalInput, revisedGoal);
              goalInput.dispatchEvent(new Event("input", { bubbles: true }));
            }

            const clarification = Array.from(
              builder.querySelectorAll(".builder-message p")
            ).find((paragraph) =>
              paragraph.textContent.includes(
                "这类工作更接近持续负责，还是一次性完成一个明确项目？"
              )
            );
            clarification?.closest(".builder-message")?.classList.add(
              "copy-hidden"
            );

            const hiddenAnswer = Array.from(
              builder.querySelectorAll(".builder-message--user p")
            ).find((paragraph) =>
              ["持续负责同类工作", "先完成一次发布"].includes(
                paragraph.textContent.trim()
              )
            );
            hiddenAnswer?.closest(".builder-message")?.classList.add(
              "copy-hidden"
            );

            const clarifyAction = builder.querySelector(
              '[data-testid="builder-clarify"]'
            );
            if (
              clarifyAction &&
              !builder.dataset.copyClarificationSkipped
            ) {
              builder.dataset.copyClarificationSkipped = "true";
              clarifyAction.click();
            }

            const recommendation = Array.from(
              builder.querySelectorAll(".builder-message p")
            ).find((paragraph) =>
              paragraph.textContent.startsWith("明白了。我先按")
            );
            setText(
              recommendation,
              "根据你的目标，建议组建一支由 4 名成员组成的产品发布团队"
            );

            const adjustmentInput = builder.querySelector(
              'textarea[aria-label="调整团队提案"]'
            );
            if (adjustmentInput) {
              adjustmentInput.setAttribute(
                "placeholder",
                "例如：让策略负责人最后提供一份发布清单"
              );
            }
          }

          const proposal = step.querySelector(
            '[data-testid="team-proposal"]'
          );
          if (proposal) {
            setText(
              proposal.querySelector(".team-proposal__head > div > span"),
              "团队方案 · 4 名成员"
            );
            setText(
              proposal.querySelector(".team-proposal__head > div > strong"),
              "产品发布团队"
            );
            setText(
              proposal.querySelector(".team-proposal__head > div > p"),
              "从资料研究到上线前复核，交付可直接发布的产品内容"
            );

            const memberList = proposal.querySelector(".proposal-members");
            if (
              memberList &&
              !memberList.querySelector(".copy-brand-reviewer")
            ) {
              const sourceMember =
                memberList.querySelector(".proposal-member:last-child");
              const reviewer = sourceMember?.cloneNode(true);
              if (reviewer) {
                reviewer.classList.add("copy-brand-reviewer");
                memberList.append(reviewer);
              }
            }

            const members = proposal.querySelectorAll(".proposal-member");
            const memberCopy = [
              [
                "策略负责人",
                "明确发布目标，安排工作并确认最终版本"
              ],
              ["研究员", "收集资料，核对产品信息和关键事实"],
              ["内容作者", "撰写发布内容，并根据审校意见修改"],
              ["品牌审校", "检查事实、表达和品牌一致性"]
            ];
            memberCopy.forEach(([name, description], index) => {
              const member = members[index];
              if (!member) return;
              setLeadingText(member.querySelector("strong"), name);
              setText(member.querySelector("p"), description);
            });

            if (!proposal.querySelector(".copy-collaboration")) {
              const collaboration = document.createElement("div");
              collaboration.className = "copy-collaboration";
              collaboration.innerHTML = `
                <span>协作示例</span>
                <p>你提出目标 → 策略负责人安排 → 研究员提供资料 → 内容作者起草 ⇄ 品牌审校复核 → 策略负责人交付</p>
                <small>未通过时，内容作者修改后再次提交审校</small>
              `;
              proposal
                .querySelector(".proposal-handoff")
                ?.after(collaboration);
            }
          }

          const createdTeam = step.querySelector(
            '[data-testid="created-team-card"]'
          );
          if (createdTeam) {
            setText(
              createdTeam.querySelector(".team-identity > div > span"),
              "从资料研究到上线前复核，交付可直接发布的产品内容"
            );

            const memberList = createdTeam.querySelector(".team-members");
            if (
              memberList &&
              !memberList.querySelector(".copy-brand-reviewer")
            ) {
              const sourceMember =
                memberList.querySelector(".member-chip:last-child");
              const reviewer = sourceMember?.cloneNode(true);
              if (reviewer) {
                reviewer.classList.add("copy-brand-reviewer");
                memberList.append(reviewer);
              }
            }

            const members = createdTeam.querySelectorAll(".member-chip");
            const memberCopy = [
              ["策", "策略负责人", "主 Agent"],
              ["研", "研究员", "研究"],
              ["写", "内容作者", "写作"],
              ["审", "品牌审校", "审校"]
            ];
            memberCopy.forEach(([initial, name, duty], index) => {
              const member = members[index];
              if (!member) return;
              setText(member.querySelector(".member-avatar"), initial);
              setText(member.querySelector("strong"), name);
              setText(member.querySelector("small"), duty);
            });
          }
        };

        const applyRelayCopy = () => {
          const step = document.querySelector('[data-testid="step-3"]');
          if (!step) return;

          setText(
            step.querySelector(".stage-heading h1"),
            "团队会这样完成你的目标"
          );
          setText(
            step.querySelector(".stage-heading p"),
            "主 Agent 负责安排与交付，成员完成开发、测试和修改"
          );

          const relay = step.querySelector(".relay-card");
          if (!relay) return;

          setLeadingText(relay.querySelector(".live-indicator"), "协作示例");
          setText(
            relay.querySelector(".relay-grid-heading > span"),
            "工作记录"
          );
          setLeadingText(
            relay.querySelector(".relay-caption"),
            "工作过程、修改记录和测试结果都会保留在对话中"
          );
          relay
            .querySelector(".relay-role-columns")
            ?.setAttribute("aria-label", "团队成员");
          relay
            .querySelector(".relay-history")
            ?.setAttribute("aria-label", "协作记录");

          relay.querySelectorAll(".relay-handoff").forEach((handoff) => {
            const member = handoff
              .querySelector("b")
              ?.textContent.trim()
              .replace(/^@/, "");
            if (!member) return;
            const action = handoff.textContent.includes("打回")
              ? "退回修改"
              : "交给";
            setText(handoff, `${action} ${member}`);
          });
          relay.querySelectorAll(".pill").forEach((pill) => {
            if (pill.textContent.trim() === "已收尾") {
              setText(pill, "已完成");
            }
          });

          const teamName = relay
            .querySelector(".relay-topline strong")
            ?.textContent.trim();
          if (teamName !== "开发团队") return;

          setText(
            relay.querySelector(".relay-goal-row .relay-msg__text"),
            "运行时长统计不准确，请找出原因并修复。"
          );

          const roleColumns = relay.querySelector(".relay-role-columns");
          const roleCopy = [
            ["经", "开发经理"],
            ["开", "开发"],
            ["测", "测试"]
          ];
          const roleElements = roleColumns?.querySelectorAll(":scope > span");
          roleCopy.forEach(([initial, name], index) => {
            const role = roleElements?.[index];
            if (!role) return;
            setText(role.querySelector("b"), initial);
            setText(role.querySelector("small"), name);
          });

          const beatCopy = [
            {
              role: 0,
              name: "开发经理",
              tag: "安排工作",
              body: "我来负责这个问题。开发先定位统计口径和异常条件，完成修复后交由测试独立验证。",
              handoff: ["交给", "开发"]
            },
            {
              role: 1,
              name: "开发",
              tag: "定位并修复",
              body: "问题出在断线后的时间仍被累计。我已按心跳断档重新切分时段，并补充回归测试。",
              handoff: ["交给", "测试"]
            },
            {
              role: 2,
              name: "测试",
              tag: "独立测试",
              body: "断线边界已经修复，但 pending 状态下仍有两处统计不一致，暂不能通过。",
              pill: ["danger", "测试未通过"],
              handoff: ["退回修改", "开发"]
            },
            {
              role: 1,
              name: "开发",
              tag: "修改",
              body: "已补齐 pending 状态的断档处理，新增用例全部通过，重新提交测试。",
              handoff: ["交给", "测试"]
            },
            {
              role: 2,
              name: "测试",
              tag: "再次测试",
              body: "边界用例和回归测试均已通过，共 379 项测试通过，可以交付。",
              pill: ["success", "测试通过"],
              handoff: ["交给", "开发经理"]
            },
            {
              role: 0,
              name: "开发经理",
              tag: "交付结果",
              body: "运行时长统计已修复并通过两轮测试。修改内容、测试结果和审查记录都在这里。",
              pill: ["success", "已完成"]
            }
          ];

          const history = relay.querySelector(".relay-history");
          const sourceBeats = history?.querySelectorAll(".relay-msg");
          const beats = history?.querySelectorAll(".relay-msg");
          beats?.forEach((beat, index) => {
            const copy = beatCopy[index];
            if (!copy) return;

            beat.setAttribute("data-member", copy.name);
            setText(beat.querySelector(".relay-msg__head strong"), copy.name);
            setText(beat.querySelector(".relay-msg__head small"), copy.tag);
            setText(beat.querySelector(".relay-msg__text"), copy.body);

            const graph = beat.querySelector(".relay-graph-cell");
            graph?.style.setProperty("--role-index", String(copy.role));
            graph?.setAttribute(
              "aria-label",
              copy.handoff
                ? `${copy.name}${copy.handoff[0]}${copy.handoff[1]}`
                : `${copy.name}完成交付`
            );

            const path = graph?.querySelector(".relay-graph-connector");
            const svg = path?.closest("svg");
            if (path && svg && index > 0) {
              const previousX = (beatCopy[index - 1].role + 0.5) * 100;
              const currentX = (copy.role + 0.5) * 100;
              svg.setAttribute("viewBox", "0 0 300 31");
              path.setAttribute(
                "d",
                `M ${previousX} 0 C ${previousX} 20 ${currentX} 11 ${currentX} 31`
              );
            }

            const pills = beat.querySelectorAll(".relay-msg__head .pill");
            if (copy.pill) {
              let pill = pills[0];
              if (!pill) {
                pill = document.createElement("span");
                beat.querySelector(".relay-msg__head")?.append(pill);
              }
              pill.classList.remove(
                "copy-hidden",
                "pill--danger",
                "pill--success",
                "pill--amber",
                "pill--info",
                "pill--neutral"
              );
              pill.classList.add("pill", `pill--${copy.pill[0]}`);
              setText(pill, copy.pill[1]);
              Array.from(pills)
                .slice(1)
                .forEach((extraPill) =>
                  extraPill.classList.add("copy-hidden")
                );
            } else {
              pills.forEach((pill) => pill.classList.add("copy-hidden"));
            }

            let foot = beat.querySelector(".relay-msg__foot");
            if (copy.handoff) {
              if (!foot) {
                foot = document.createElement("div");
                foot.className = "relay-msg__foot";
                beat.querySelector(".relay-msg__body")?.append(foot);
              }
              let handoff = foot.querySelector(".relay-handoff");
              if (!handoff) {
                handoff = document.createElement("span");
                handoff.className = "relay-handoff";
                foot.append(handoff);
              }
              handoff.classList.toggle(
                "relay-handoff--back",
                copy.handoff[0] === "退回修改"
              );
              setText(handoff, `${copy.handoff[0]} ${copy.handoff[1]}`);
            } else {
              foot?.remove();
            }
          });

          if (roleElements?.length === 3) {
            const typing = relay.querySelector(".relay-typing");
            const visibleBeatCount = beats?.length ?? 0;
            const activeBeat = typing
              ? Math.min(
                  sourceBeats?.length ?? 0,
                  beatCopy.length - 1
                )
              : Math.max(0, visibleBeatCount - 1);
            const activeRole = beatCopy[activeBeat]?.role ?? 0;
            roleElements.forEach((role, index) => {
              role.classList.toggle("is-holder", index === activeRole);
            });
          }
        };

        const applyPrototypeCopy = () => {
          applyEnvironmentCopy();
          applyTeamSelectionCopy();
          applyRelayCopy();
        };

        new MutationObserver(applyPrototypeCopy).observe(document.body, {
          childList: true,
          characterData: true,
          subtree: true
        });
        applyPrototypeCopy();
      })();
    </script>
  </body>
</html>
