<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Runner Driver Pool Architecture</title>
  <desc id="desc">Runner converts due issues into jobs, the driver pool executes them, and runner folds results into intake state deterministically.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
  </defs>
  <rect width="920" height="360" fill="#f8fafc" />
  <g font-family="Arial, sans-serif" font-size="14" fill="#0f172a">
    <rect x="36" y="70" width="190" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" />
    <text x="131" y="104" text-anchor="middle" font-weight="700">runner tick</text>
    <text x="131" y="126" text-anchor="middle">build changed / active</text>
    <text x="131" y="146" text-anchor="middle">issue jobs</text>
    <rect x="306" y="58" width="200" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" />
    <text x="406" y="92" text-anchor="middle" font-weight="700">driver pool</text>
    <text x="406" y="116" text-anchor="middle">default: no extra limit</text>
    <text x="406" y="138" text-anchor="middle">optional maxConcurrent</text>
    <rect x="600" y="30" width="230" height="64" rx="8" fill="#e2e8f0" stroke="#64748b" />
    <text x="715" y="58" text-anchor="middle" font-weight="700">issue job #1</text>
    <text x="715" y="78" text-anchor="middle">fetch + trigger + Codex</text>
    <rect x="600" y="126" width="230" height="64" rx="8" fill="#e2e8f0" stroke="#64748b" />
    <text x="715" y="154" text-anchor="middle" font-weight="700">issue job #2</text>
    <text x="715" y="174" text-anchor="middle">fetch + trigger + Codex</text>
    <rect x="306" y="240" width="220" height="70" rx="8" fill="#fef3c7" stroke="#d97706" />
    <text x="416" y="270" text-anchor="middle" font-weight="700">deterministic fold</text>
    <text x="416" y="292" text-anchor="middle">job outcomes -> intake state</text>
    <rect x="600" y="242" width="230" height="68" rx="8" fill="#f1f5f9" stroke="#475569" />
    <text x="715" y="271" text-anchor="middle" font-weight="700">entry-level state merge</text>
    <text x="715" y="293" text-anchor="middle">role threads + contexts</text>
    <path d="M226 113 L306 113" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M506 103 L600 64" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M506 123 L600 158" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M715 94 L438 240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M715 190 L438 240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
    <path d="M526 275 L600 275" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  </g>
</svg>
