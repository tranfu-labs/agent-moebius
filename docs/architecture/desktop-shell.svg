<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" width="680" height="560">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="680" height="560" fill="#ffffff"/>
  <text x="40" y="28" font-size="14" font-weight="700" fill="#111827">改造后：Electron 桌面应用（启动应用即启动全部功能）</text>

  <rect x="40" y="48" width="600" height="260" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="56" y="72" font-size="13" font-weight="600" fill="#6b7280">Electron 桌面应用 · desktop/ 包</text>

  <rect x="56" y="84" width="276" height="96" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="194" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">主进程（装配层）</text>
  <text x="194" y="128" text-anchor="middle" font-size="11" fill="#6b7280">数据根解析 · PATH 修复 · 种子拷贝</text>
  <text x="194" y="146" text-anchor="middle" font-size="11" fill="#6b7280">环境自检 · 更新检查 · 退出收尾</text>
  <text x="194" y="164" text-anchor="middle" font-size="11" fill="#6b7280">纯逻辑拆模块，全部可单测</text>

  <rect x="348" y="84" width="276" height="96" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="486" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">主窗口 · 状态页</text>
  <text x="486" y="128" text-anchor="middle" font-size="11" fill="#6b7280">运行状态 · 环境自检 · 版本</text>
  <text x="486" y="146" text-anchor="middle" font-size="11" fill="#6b7280">窄 IPC 四个口，无配置写入口</text>
  <text x="486" y="164" text-anchor="middle" font-size="11" fill="#6b7280">打开观察页 / 数据目录 / 检查更新</text>

  <rect x="56" y="196" width="276" height="88" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="194" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">observer 只读服务</text>
  <text x="194" y="242" text-anchor="middle" font-size="11" fill="#6b7280">主进程内启动 · 动态端口</text>
  <text x="194" y="260" text-anchor="middle" font-size="11" fill="#6b7280">只读旁路语义不变</text>

  <rect x="348" y="196" width="276" height="88" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="486" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">runner 子进程</text>
  <text x="486" y="242" text-anchor="middle" font-size="11" fill="#6b7280">utilityProcess 派生 · cwd=数据根</text>
  <text x="486" y="260" text-anchor="middle" font-size="11" fill="#6b7280">状态机监管 · 崩溃退避重启</text>

  <path d="M332 132 H348" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M194 180 V196" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M332 156 L400 196" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="40" y="372" width="340" height="130" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="56" y="396" font-size="13" font-weight="600" fill="#6b7280">数据根 ~/.moebius</text>
  <rect x="56" y="408" width="148" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="130" y="425" text-anchor="middle" font-size="11" fill="#6b7280">config.local.toml</text>
  <rect x="216" y="408" width="148" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
