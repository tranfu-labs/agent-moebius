  <rect x="56" y="442" width="148" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="130" y="459" text-anchor="middle" font-size="11" fill="#6b7280">agents/（种子拷贝）</text>
  <rect x="216" y="442" width="148" height="26" rx="13" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="290" y="459" text-anchor="middle" font-size="11" fill="#6b7280">workdir/</text>

  <rect x="400" y="372" width="140" height="130" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="416" y="396" font-size="13" font-weight="600" fill="#6b7280">本机 CLI</text>
  <rect x="416" y="408" width="108" height="36" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="470" y="431" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">codex</text>
  <rect x="416" y="454" width="108" height="36" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="470" y="477" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">gh</text>

  <rect x="560" y="372" width="80" height="130" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="600" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">GitHub</text>
  <text x="600" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">Releases</text>
  <text x="600" y="436" text-anchor="middle" font-size="10" fill="#6b7280">win/linux</text>
  <text x="600" y="450" text-anchor="middle" font-size="10" fill="#6b7280">自动更新</text>
  <text x="600" y="470" text-anchor="middle" font-size="10" fill="#6b7280">macOS</text>
  <text x="600" y="484" text-anchor="middle" font-size="10" fill="#6b7280">跳转下载页</text>

  <path d="M194 284 L180 372" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="130" y="336" font-size="10" fill="#6b7280">只读</text>
  <path d="M420 284 L280 372" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="316" y="336" font-size="10" fill="#6b7280">读写状态</text>
  <path d="M486 284 L470 372" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="490" y="336" font-size="10" fill="#6b7280">spawn</text>
  <path d="M600 308 V372" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="608" y="344" font-size="10" fill="#6b7280">更新检查</text>
