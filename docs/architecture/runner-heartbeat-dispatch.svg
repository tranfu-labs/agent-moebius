<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" role="img" aria-labelledby="title desc">
  <title id="title">变更后：心跳扫描派发与 codex 执行解耦</title>
  <desc id="desc">heartbeat 每分钟只做扫描、due 判定与派发，从不等待执行；issue-dispatcher 用 in-flight 集合防重派发，job 经 codex driver pool 长跑，完成即折叠进 state-persister 单写者并串行化落盘。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
  </defs>
  <rect width="920" height="480" fill="#f8fafc" />
  <g font-family="Arial, sans-serif" font-size="14" fill="#0f172a">
    <rect x="20" y="40" width="150" height="56" rx="8" fill="#e2e8f0" stroke="#64748b" />
    <text x="95" y="64" text-anchor="middle" font-weight="700">定时器</text>
    <text x="95" y="84" text-anchor="middle" font-size="12">每分钟触发</text>
    <line x1="170" y1="68" x2="205" y2="68" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="210" y="20" width="430" height="212" rx="10" fill="none" stroke="#94a3b8" stroke-dasharray="7 5" />
    <text x="226" y="44" font-size="12" fill="#475569">heartbeat——只扫描与派发，秒级，从不等待 codex</text>

    <rect x="240" y="56" width="370" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" />
    <text x="425" y="75" text-anchor="middle" font-weight="700">scanner：扫描 due 仓库</text>
    <text x="425" y="93" text-anchor="middle" font-size="12">先异步取列表，再纯变换应用</text>
    <line x1="425" y1="100" x2="425" y2="108" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="240" y="112" width="370" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" />
    <text x="425" y="131" text-anchor="middle" font-weight="700">due 判定 + 批内去重</text>
    <text x="425" y="149" text-anchor="middle" font-size="12">既有纯函数，不改</text>
    <line x1="425" y1="156" x2="425" y2="164" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="240" y="168" width="370" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" />
    <text x="425" y="187" text-anchor="middle" font-weight="700">派发 job</text>
    <text x="425" y="205" text-anchor="middle" font-size="12">交给 dispatcher 后立即返回</text>

    <rect x="680" y="40" width="220" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" />
    <text x="790" y="68" text-anchor="middle" font-weight="700">state-persister（新）</text>
    <text x="790" y="88" text-anchor="middle" font-size="12">单写者内存权威状态</text>
    <text x="790" y="106" text-anchor="middle" font-size="12">写串行化 + 合并，原子落盘</text>
    <line x1="640" y1="80" x2="676" y2="80" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="790" y1="130" x2="790" y2="158" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="680" y="162" width="220" height="50" rx="8" fill="#e2e8f0" stroke="#64748b" />
    <text x="790" y="183" text-anchor="middle" font-weight="700">state 文件</text>
    <text x="790" y="201" text-anchor="middle" font-size="12">格式不变，每次变更即调度写</text>

    <line x1="425" y1="232" x2="425" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="437" y="258" font-size="12" fill="#475569">派发（不 await 执行）</text>

    <rect x="210" y="280" width="430" height="170" rx="10" fill="none" stroke="#7c3aed" stroke-dasharray="7 5" />
    <text x="226" y="302" font-size="12" fill="#6d28d9">issue-dispatcher（新）——派发与折叠</text>

    <rect x="240" y="316" width="180" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" />
    <text x="330" y="338" text-anchor="middle" font-weight="700">in-flight 集合</text>
    <text x="330" y="356" text-anchor="middle" font-size="12">同 issue 严格串行</text>

    <rect x="440" y="316" width="180" height="52" rx="8" fill="#fef9c3" stroke="#ca8a04" />
    <text x="530" y="338" text-anchor="middle" font-weight="700">skip-inflight</text>
    <text x="530" y="356" text-anchor="middle" font-size="12">在跑 issue 再派发 → 跳过</text>

    <rect x="240" y="382" width="380" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" />
    <text x="430" y="404" text-anchor="middle" font-weight="700">完成即折叠</text>
    <text x="430" y="422" text-anchor="middle" font-size="12">纯函数 fold + active 上限（豁免在跑）</text>

    <path d="M640 310 L660 310 L660 85 L676 85" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="652" y="252" text-anchor="end" font-size="12" fill="#475569">完成即折叠落盘</text>

    <rect x="680" y="300" width="220" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" />
    <text x="790" y="328" text-anchor="middle" font-weight="700">codex driver pool</text>
    <text x="790" y="348" text-anchor="middle" font-size="12">并发上限 5（不变）</text>
    <text x="790" y="368" text-anchor="middle" font-size="12">job 可长跑，只占 1 个名额</text>
    <text x="790" y="388" text-anchor="middle" font-size="12">不阻塞心跳与其他 issue</text>
    <line x1="640" y1="340" x2="676" y2="340" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="676" y1="390" x2="644" y2="390" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" />
  </g>
</svg>
