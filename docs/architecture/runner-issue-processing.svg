<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="ui-sans-serif, -apple-system, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">改造后 · 三条绿色破除路径</text>
  <text x="480" y="52" text-anchor="middle" font-size="13" fill="#475569">A / B / C 分别在 intake / prescript / fetch 层收敛</text>

  <!-- tick -->
  <rect x="410" y="80" width="140" height="44" rx="22" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="480" y="107" text-anchor="middle" font-size="13" fill="#1e1b4b">tick 1 min</text>

  <!-- getDue -->
  <rect x="360" y="150" width="240" height="46" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="480" y="178" text-anchor="middle" font-size="13" fill="#0f172a">getDueActiveIssueSources</text>

  <!-- pollActiveIssue with state -->
  <rect x="300" y="222" width="360" height="70" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">pollActiveIssue</text>
  <text x="480" y="266" text-anchor="middle" font-size="12" fill="#065f46">fetchIssueWithComments (JSON: body,comments,updatedAt,state)</text>
  <text x="480" y="282" text-anchor="middle" font-size="12" fill="#059669">★C · 多拉 state 字段</text>

  <!-- decide closed? -->
  <polygon points="480,318 560,358 480,398 400,358" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="356" text-anchor="middle" font-size="12" fill="#065f46">state = CLOSED？</text>

  <!-- closed branch -->
  <rect x="720" y="330" width="200" height="60" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="820" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">outcome = "issue-closed"</text>
  <text x="820" y="374" text-anchor="middle" font-size="12" fill="#065f46">从 state.issues 移除 ★C</text>

  <!-- processIssueSource with self-healing -->
  <rect x="300" y="424" width="360" height="86" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">processIssueSource → dev prescript</text>
  <text x="480" y="470" text-anchor="middle" font-size="12" fill="#059669">★B · stale 分支 → removeWorktree + re-add origin/main</text>
  <text x="480" y="488" text-anchor="middle" font-size="12" fill="#065f46">成功 → ok, codexCwd → Codex 正常跑</text>
  <text x="480" y="504" text-anchor="middle" font-size="12" fill="#334155">重建失败才 fail closed</text>

  <!-- record failed (A) -->
  <rect x="300" y="540" width="360" height="90" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">recordIssueProcessingOutcome(failed) ★A</text>
  <text x="480" y="586" text-anchor="middle" font-size="12" fill="#065f46">· updatedAt 保持旧值（不 ack 未处理变化）</text>
  <text x="480" y="602" text-anchor="middle" font-size="12" fill="#065f46">· failureCount++ / lastFailureReason 更新</text>
  <text x="480" y="618" text-anchor="middle" font-size="12" fill="#065f46">· 达 FAILURE_RETRY_LIMIT 后尝试死信</text>

  <!-- arrows main flow -->
  <line x1="480" y1="124" x2="480" y2="150" stroke="#334155" marker-end="url(#arrow2)"/>
  <line x1="480" y1="196" x2="480" y2="222" stroke="#334155" marker-end="url(#arrow2)"/>
  <line x1="480" y1="292" x2="480" y2="318" stroke="#334155" marker-end="url(#arrow2)"/>
  <line x1="480" y1="398" x2="480" y2="424" stroke="#334155" marker-end="url(#arrow2)"/>
  <text x="490" y="415" font-size="11" fill="#065f46">否</text>
  <line x1="480" y1="510" x2="480" y2="540" stroke="#334155" marker-end="url(#arrow2)"/>
  <text x="500" y="530" font-size="11" fill="#334155">重建失败</text>

  <!-- closed branch arrow (green) -->
  <line x1="560" y1="358" x2="720" y2="358" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="640" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">是</text>

  <!-- Codex ok branch -->
  <line x1="660" y1="490" x2="750" y2="490" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="750" y="465" width="150" height="50" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="825" y="486" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Codex 执行 → 评论</text>
  <text x="825" y="504" text-anchor="middle" font-size="11" fill="#065f46">success 分支照旧</text>

  <!-- back to tick (green: failed keeps old updatedAt and retries by poll) -->
  <path d="M 300,585 C 130,585 130,102 410,102" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="150" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">★A</text>
  <text x="150" y="346" text-anchor="middle" font-size="11" fill="#065f46">updatedAt 未 ack</text>
  <text x="150" y="362" text-anchor="middle" font-size="11" fill="#065f46">按 poll 重试</text>
  <text x="150" y="378" text-anchor="middle" font-size="11" fill="#065f46">直到成功 / 死信</text>

  <!-- legend -->
  <rect x="700" y="150" width="230" height="150" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="815" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">收敛点</text>
  <text x="712" y="196" font-size="11" fill="#059669">★A failed 不推进 updatedAt</text>
  <text x="712" y="212" font-size="11" fill="#059669">    failureCount++ 后重试</text>
  <text x="712" y="228" font-size="11" fill="#059669">    死信成功才 ack</text>
  <text x="712" y="250" font-size="11" fill="#059669">★B stale → 重建 worktree</text>
  <text x="712" y="270" font-size="11" fill="#059669">★C CLOSED → 从 state 删</text>
  <text x="712" y="292" font-size="11" fill="#475569">现象：60s 至多 1 次 fail</text>
</svg>
