<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #111827; }
    .title { font-size: 22px; font-weight: 600; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .label { font-size: 15px; font-weight: 600; }
    .detail { font-size: 12px; fill: #6b7280; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; rx: 8; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1.5; rx: 8; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; stroke-width: 1.5; rx: 8; }
    .orange { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.5; rx: 8; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="40" y="44" class="title">改造后：单条活动 Markdown 原地更新，最终消息静态渲染</text>
  <text x="40" y="68" class="subtitle">JSONL 事件不是消息；活动事实留在内存，历史事实仍只来自 SQLite</text>

  <rect x="30" y="116" width="170" height="92" class="blue"/>
  <text x="50" y="150" class="label">Codex CLI</text>
  <text x="50" y="175" class="detail">--json stdout</text>
  <text x="50" y="193" class="detail">完整事件段</text>

  <rect x="245" y="116" width="180" height="92" class="box"/>
  <text x="265" y="150" class="label">stdout.jsonl</text>
  <text x="265" y="175" class="detail">继续完整落盘</text>
  <text x="265" y="193" class="detail">最终提取独立兜底</text>

  <rect x="470" y="100" width="210" height="124" class="purple"/>
  <text x="490" y="136" class="label">可见事件适配器</text>
  <text x="490" y="161" class="detail">完整 JSONL line framing</text>
  <text x="490" y="179" class="detail">只收 agent_message</text>
  <text x="490" y="197" class="detail">工具 / reasoning 不可见</text>

  <rect x="725" y="100" width="210" height="124" class="blue"/>
  <text x="745" y="136" class="label">ActiveLocalRun</text>
  <text x="745" y="161" class="detail">runId + liveMarkdown</text>
  <text x="745" y="179" class="detail">只保留最新一段</text>
  <text x="745" y="197" class="detail">不写 SQLite</text>

  <rect x="980" y="100" width="190" height="124" class="box"/>
  <text x="1000" y="136" class="label">state snapshot</text>
  <text x="1000" y="161" class="detail">每秒轮询</text>
  <text x="1000" y="179" class="detail">liveMarkdown</text>
  <text x="1000" y="197" class="detail">summary fallback</text>

  <rect x="245" y="352" width="180" height="110" class="green"/>
  <text x="265" y="388" class="label">SQLite messages</text>
  <text x="265" y="413" class="detail">用户消息</text>
  <text x="265" y="431" class="detail">一条最终 Agent 回复</text>
  <text x="265" y="449" class="detail">结构化 system facts</text>

  <rect x="500" y="352" width="200" height="110" class="box"/>
  <text x="520" y="388" class="label">TimelineEntry</text>
  <text x="520" y="413" class="detail">user / agent → Markdown</text>
  <text x="520" y="431" class="detail">system → 结构化组件</text>
  <text x="520" y="449" class="detail">不复制活动消息</text>

  <rect x="790" y="328" width="240" height="158" class="purple"/>
  <text x="810" y="366" class="label">MarkdownMessage / Streamdown</text>
  <text x="810" y="391" class="detail">活动 run：streaming + 原地替换</text>
  <text x="810" y="409" class="detail">历史正文：static</text>
  <text x="810" y="427" class="detail">GFM + CJK + code + math</text>
  <text x="810" y="445" class="detail">Mermaid + sanitize + harden</text>
  <text x="810" y="463" class="detail">同一套设计令牌</text>

  <rect x="650" y="552" width="220" height="96" class="orange"/>
  <text x="670" y="588" class="label">preload 外链 IPC</text>
  <text x="670" y="613" class="detail">绝对 URL + 协议复验</text>
  <text x="670" y="631" class="detail">拒绝窗口 / 本地协议</text>

  <rect x="930" y="552" width="220" height="96" class="orange"/>
  <text x="950" y="588" class="label">系统浏览器</text>
  <text x="950" y="613" class="detail">shell.openExternal</text>
  <text x="950" y="631" class="detail">http / https / mailto</text>

  <line x1="200" y1="162" x2="245" y2="162" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="425" y1="162" x2="470" y2="162" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="680" y1="162" x2="725" y2="162" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="935" y1="162" x2="980" y2="162" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1075 224 L1075 274 L910 274 L910 328" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <path d="M335 208 L335 352" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="425" y1="407" x2="500" y2="407" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="700" y1="407" x2="790" y2="407" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <path d="M910 486 L910 520 L760 520 L760 552" fill="none" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <line x1="870" y1="600" x2="930" y2="600" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

  <rect x="206" y="143" width="32" height="22" fill="#ffffff" opacity="0.95"/>
  <text x="222" y="158" text-anchor="middle" class="detail">事件</text>
  <rect x="687" y="143" width="32" height="22" fill="#ffffff" opacity="0.95"/>
  <text x="703" y="158" text-anchor="middle" class="detail">替换</text>
  <rect x="720" y="388" width="58" height="22" fill="#ffffff" opacity="0.95"/>
  <text x="749" y="403" text-anchor="middle" class="detail">最终正文</text>
  <rect x="788" y="501" width="58" height="22" fill="#ffffff" opacity="0.95"/>
  <text x="817" y="516" text-anchor="middle" class="detail">确认链接</text>

  <line x1="42" y1="687" x2="78" y2="687" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="88" y="691" class="detail">活动 snapshot</text>
  <line x1="220" y1="687" x2="256" y2="687" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="266" y="691" class="detail">持久消息</text>
  <line x1="378" y1="687" x2="414" y2="687" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="424" y="691" class="detail">事件变换</text>
  <line x1="540" y1="687" x2="576" y2="687" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <text x="586" y="691" class="detail">外部动作</text>
</svg>
