name: Feature request
description: Propose an improvement to Moebius
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the concrete workflow or limitation you want to improve.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe what a successful result would let users do.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Share an implementation or interaction idea if you have one.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain any workarounds or alternatives you tried.
